<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>虚拟试戴 · LUMIÈRE WIGS</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <div data-role="header"></div>

  <main>
    <section style="padding-top: 40px; padding-bottom: 20px;">
      <div class="container">
        <div class="eyebrow">Virtual Try-On</div>
        <h2>在自己脸上试戴 —— 拖拽即可</h2>
        <p class="lead">上传一张正面自拍（仅浏览器本地处理，绝不上传服务器）。拖拽假发、缩放、旋转、换色，所见即所得。</p>
      </div>
    </section>

    <section style="padding-top:0;">
      <div class="container">
        <div class="tryon-layout">
          <div class="tryon-stage" id="stage">
            <canvas id="photo"></canvas>
            <canvas id="wig"></canvas>
            <div class="placeholder" id="ph">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8" cy="10" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
              <strong>上传一张正面照片开始试戴</strong>
              <span style="font-size:.85rem; color:var(--ink-faded);">建议：脸部在画面中间、头发自然放下、光线柔和。</span>
              <label class="btn btn-rose mt-3">
                <input type="file" id="upload" accept="image/*" hidden />
                上传照片
              </label>
              <button class="btn btn-ghost btn-sm mt-3" id="use-demo">或使用示例模特</button>
            </div>
          </div>

          <aside class="tryon-controls">
            <div class="card panel">
              <h4 style="margin-bottom:12px;">选择假发</h4>
              <select class="select" id="product-picker" style="width:100%;"></select>
              <div class="form-field mt-4">
                <label>颜色</label>
                <div class="color-dots" id="colors"></div>
              </div>
            </div>

            <div class="card panel">
              <h4 style="margin-bottom:12px;">微调位置</h4>
              <div class="form-field">
                <label>水平</label>
                <input type="range" id="tx" min="-200" max="200" value="0" />
              </div>
              <div class="form-field mt-3">
                <label>垂直</label>
                <input type="range" id="ty" min="-200" max="200" value="0" />
              </div>
              <div class="form-field mt-3">
                <label>大小</label>
                <input type="range" id="scale" min="50" max="200" value="100" />
              </div>
              <div class="form-field mt-3">
                <label>旋转</label>
                <input type="range" id="rot" min="-30" max="30" value="0" />
              </div>
              <div class="form-field mt-3">
                <label>透明度</label>
                <input type="range" id="alpha" min="50" max="100" value="100" />
              </div>
              <div class="form-field mt-3">
                <label>色相偏移</label>
                <input type="range" id="hue" min="-180" max="180" value="0" />
              </div>
            </div>

            <div class="card panel">
              <div class="row" style="gap:8px; flex-wrap:wrap;">
                <button class="btn btn-outline btn-sm" id="reset-photo">更换照片</button>
                <button class="btn btn-outline btn-sm" id="reset-tx">复位位置</button>
                <button class="btn btn-rose btn-sm" id="snap">保存效果图</button>
              </div>
            </div>

            <div class="card panel">
              <div class="eyebrow">隐私提示</div>
              <p style="font-size:.85rem; color:var(--ink-soft); margin-top:6px;">
                你的照片只会在浏览器内处理，不会上传到任何服务器。
              </p>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <div data-role="footer"></div>
  <script type="module" src="../assets/js/tryon.js"></script>
</body>
</html>
