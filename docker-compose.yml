version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: data-os-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: dataos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d dataos"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: data-os-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: /workspace/backend
    container_name: data-os-backend
    env_file:
      - /workspace/backend/.env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: /workspace/backend
    container_name: data-os-worker
    env_file:
      - /workspace/backend/.env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A app.tasks.worker.celery_app worker --loglevel=info"

  beat:
    build:
      context: /workspace/backend
    container_name: data-os-beat
    env_file:
      - /workspace/backend/.env.example
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A app.tasks.worker.celery_app beat --loglevel=info"

  frontend:
    image: node:22-alpine
    container_name: data-os-frontend
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - /workspace/frontend:/app
    depends_on:
      - backend
    command: >
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  redis_data:
